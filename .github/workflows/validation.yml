name: Validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: macos-latest
    timeout-minutes: 35
    env:
      DATABASE_URL: postgresql:///scout
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable
      - name: Start Postgres
        run: |
          brew install postgresql@17
          echo "$(brew --prefix postgresql@17)/bin" >> "$GITHUB_PATH"
          brew services start postgresql@17
          for _ in {1..20}; do
            if "$(brew --prefix postgresql@17)/bin/pg_isready" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          "$(brew --prefix postgresql@17)/bin/createdb" scout || true
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm --filter @scout/webapp exec playwright install chromium
      - name: Run full verification
        run: pnpm run verify:all
